# Perfil de producao/self-hosting: Postgres real, sem H2 console exposto.
# Ativar com SPRING_PROFILES_ACTIVE=prod (ja definido no docker-compose.yml).

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/convive}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:convive}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:convive}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false

# Defina uma chave propria e secreta em producao (ex: via variavel de ambiente APP_REMEMBER_ME_KEY).
app.remember-me.key=${APP_REMEMBER_ME_KEY:chave-secreta-unica-do-projeto-convive}
