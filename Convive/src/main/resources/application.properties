spring.application.name=Convive

server.port=8085
# BD criada antes da remoĂ§Ă£o da entidade Administrador: no H2, apague as linhas da tabela ADMINISTRADOR ou remova ./data/convivedb* em dev para recriar o schema.
spring.datasource.url=jdbc:h2:file:./data/convivedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.thymeleaf.cache=false


spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.config.import=optional:classpath:application-local.properties

# SMTP Gmail â€” use senha de app (Google Conta > SeguranĂ§a > Senhas de app), nunca a senha da conta.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Caixa que recebe mensagens do formulĂ¡rio (padrĂ£o: mesmo endereĂ§o que envia, se definido)
app.contact.to=${APP_CONTACT_TO:${spring.mail.username}}

# Configuraçăo de Upload de Arquivos
app.upload.dir=uploads/ocorrencias/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
