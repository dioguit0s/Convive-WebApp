spring.application.name=Convive

server.port=8081
spring.datasource.url=jdbc:h2:file:./data/convivedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.config.import=optional:classpath:application-local.properties

# SMTP Gmail — use senha de app (Google Conta > Segurança > Senhas de app), nunca a senha da conta.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Caixa que recebe mensagens do formulário (padrão: mesmo endereço que envia, se definido)
app.contact.to=${APP_CONTACT_TO:${spring.mail.username}}
