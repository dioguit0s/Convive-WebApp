spring.application.name=Convive

server.port=8085
spring.datasource.url=jdbc:h2:file:./data/convivedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.thymeleaf.cache=false


spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.config.import=optional:classpath:application-local.properties

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Caixa que recebe mensagens do formulario (padrao: mesmo endereco que envia, se definido)
app.contact.to=${APP_CONTACT_TO:${spring.mail.username}}

app.base-url=${APP_BASE_URL:http://localhost:8085}
app.password-reset.expiration-minutes=60

# Configuracaoo de Upload de Arquivos
app.upload.dir=uploads/ocorrencias/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
