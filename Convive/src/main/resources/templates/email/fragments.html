<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<body>

<!--/*@thymesVar id="brandName" type="java.lang.String"*/-->
<th:block th:fragment="header">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:24px;">
        <tr>
            <td style="padding:20px 24px;background-color:#1e3a5f;border-radius:8px 8px 0 0;">
                <span style="font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:0.5px;"
                      th:text="${brandName}">Convive</span>
            </td>
        </tr>
    </table>
</th:block>

<th:block th:fragment="footer(automated)">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin-top:32px;">
        <tr>
            <td style="padding:16px 24px;background-color:#f1f5f9;border-radius:0 0 8px 8px;border-top:1px solid #e2e8f0;">
                <p style="margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#64748b;line-height:1.5;"
                   th:if="${automated}">
                    Este é um e-mail automático enviado pelo sistema Convive. Por favor, não responda diretamente a esta mensagem.
                </p>
                <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#64748b;line-height:1.5;">
                    <span th:text="${brandName}">Convive</span> — Gestão condominial
                    <span th:if="${portalUrl != null}"> · <a th:href="${portalUrl}" style="color:#1e3a5f;text-decoration:none;" th:text="${portalUrl}">portal</a></span>
                </p>
            </td>
        </tr>
    </table>
</th:block>

<th:block th:fragment="button(label, url)">
    <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0;">
        <tr>
            <td style="border-radius:6px;background-color:#1e3a5f;">
                <a th:href="${url}" th:text="${label}"
                   style="display:inline-block;padding:12px 28px;font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:6px;">
                    Ação
                </a>
            </td>
        </tr>
    </table>
</th:block>

<th:block th:fragment="detailsTable">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%"
           style="margin:16px 0;border:1px solid #e2e8f0;border-radius:6px;border-collapse:separate;">
        <tr th:each="row : ${detailRows}">
            <td style="padding:10px 16px;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#64748b;width:38%;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;"
                th:text="${row.label}">Campo</td>
            <td style="padding:10px 16px;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#1e293b;border-bottom:1px solid #e2e8f0;"
                th:text="${row.value}">Valor</td>
        </tr>
    </table>
</th:block>

</body>
</html>
