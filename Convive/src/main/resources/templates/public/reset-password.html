<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Convive - Nova senha</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script th:src="@{/js/tailwindTheme.js}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/landing.css}"/>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-background min-h-screen w-full flex items-center justify-center p-md sm:p-margin antialiased">
<main class="w-full max-w-[440px]">
    <div class="bg-surface-container-lowest border border-outline-variant shadow-sm rounded-xl p-lg flex flex-col gap-lg relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-primary-container"></div>
        <div class="text-center flex flex-col gap-xs items-center">
            <h1 class="font-display text-display text-primary tracking-tight">Convive</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Definir nova senha</p>
        </div>
        <div th:if="${tokenInvalid}" class="p-sm rounded-lg bg-error-container/20 text-error border border-error/30 font-body-sm text-center" role="alert">
            Link inválido ou expirado. Solicite um novo link em
            <a class="font-medium underline" th:href="@{/forgot-password}">Esqueci minha senha</a>.
        </div>
        <form th:unless="${tokenInvalid}" class="flex flex-col gap-md" method="post" th:action="@{/reset-password}" th:object="${resetPasswordForm}">
            <input th:field="*{token}" type="hidden"/>
            <div class="flex flex-col gap-base">
                <label class="font-label-md text-label-md text-on-surface uppercase" for="password">Nova senha</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
                    <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-[40px] pr-sm py-sm font-body-md text-on-surface focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container"
                           id="password" placeholder="Mínimo 8 caracteres" th:field="*{password}" type="password" required/>
                </div>
                <p th:errors="*{password}" class="font-body-sm text-error"></p>
            </div>
            <div class="flex flex-col gap-base">
                <label class="font-label-md text-label-md text-on-surface uppercase" for="confirmPassword">Confirmar senha</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
                    <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-[40px] pr-sm py-sm font-body-md text-on-surface focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container"
                           id="confirmPassword" placeholder="Repita a nova senha" th:field="*{confirmPassword}" type="password" required/>
                </div>
                <p th:errors="*{confirmPassword}" class="font-body-sm text-error"></p>
            </div>
            <button class="w-full bg-primary-container text-on-primary font-body-md font-medium py-[12px] px-md rounded-lg mt-sm hover:opacity-90" type="submit">Redefinir senha</button>
        </form>
        <div class="text-center pt-md mt-sm border-t border-surface-container-high">
            <a class="font-body-sm text-on-tertiary-container font-medium hover:underline" th:href="@{/login}">Voltar ao login</a>
        </div>
    </div>
</main>
</body>
</html>
