<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Convive - Login</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script th:src="@{/js/tailwindTheme.js}"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/css/landing.css}"/>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-background min-h-screen w-full flex items-center justify-center p-md sm:p-margin antialiased">
<main class="w-full max-w-[440px]">
    <div class="bg-surface-container-lowest border border-outline-variant shadow-sm rounded-xl p-lg flex flex-col gap-lg relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-primary-container"></div>

        <div class="text-center flex flex-col gap-xs items-center">
            <h1 class="font-display text-display text-primary tracking-tight">Convive</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Bem-vindo de volta</p>
        </div>

        <div th:if="${param.logout}"
             class="mt-md p-sm rounded-lg bg-secondary-container/20 text-on-secondary-container border border-on-secondary-container/30 font-body-sm text-center"
             role="status">
            Logout realizado com sucesso.
        </div>

        <div th:if="${param.error}"
             class="mt-md p-sm rounded-lg bg-error-container/20 text-error border border-error/30 font-body-sm text-center"
             role="alert">
            E-mail ou senha inválidos.
        </div>

        <form class="flex flex-col gap-md" th:action="@{/login}" method="post">
            <div class="flex flex-col gap-base">
                <label class="font-label-md text-label-md text-on-surface uppercase" for="email">Email</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">mail</span>
                    <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-[40px] pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-colors placeholder:text-outline" id="email" name="email" placeholder="seu@email.com" type="email" required/>
                </div>
            </div>

            <div class="flex flex-col gap-base">
                <label class="font-label-md text-label-md text-on-surface uppercase" for="password">Senha</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
                    <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-[40px] pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-colors placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password" required/>
                </div>
            </div>

            <div class="flex items-center justify-between mt-xs">
                <div class="flex items-center gap-xs">
                    <input class="w-4 h-4 rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface-container-lowest" id="remember" type="checkbox"/>
                    <label class="font-body-sm text-body-sm text-on-surface cursor-pointer select-none" for="remember">Lembrar de mim</label>
                </div>
                <a class="font-body-sm text-body-sm text-on-tertiary-container hover:underline font-medium" href="#">Esqueci minha senha</a>
            </div>

            <button class="w-full bg-primary-container text-on-primary font-body-md text-body-md font-medium py-[12px] px-md rounded-lg mt-sm hover:opacity-90 transition-opacity flex items-center justify-center gap-xs" type="submit">
                Entrar
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
            </button>
        </form>

        <div class="text-center pt-md mt-sm border-t border-surface-container-high">
            <p class="font-body-sm text-body-sm text-on-surface-variant">
                Ainda não tem acesso?<br class="sm:hidden"/>
                <a class="text-on-tertiary-container font-medium hover:underline ml-1" th:href="@{/contact}">Entre em contato com a administração.</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
