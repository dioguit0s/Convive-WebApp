<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="bg-surface-container-lowest flex justify-between items-center px-margin py-4 w-full shadow-sm sticky top-0 z-50">

    <div class="flex items-center gap-2">
        <a th:href="@{/}">
            <span class="material-symbols-outlined text-primary text-3xl" data-icon="domain">domain</span>
            <div class="text-h2 font-h2 text-primary">Convive</div>
        </a>
    </div>
    <div class="hidden md:flex gap-md">
        <a th:href="@{/}" class="text-on-surface-variant font-body-md text-body-md hover:text-primary transition-colors duration-200">Home</a>
        <a th:href="@{/features}" class="text-on-surface-variant font-body-md text-body-md hover:text-primary transition-colors duration-200">Features</a>
        <a th:href="@{/about}" class="text-on-surface-variant font-body-md text-body-md hover:text-primary transition-colors duration-200">About Us</a>

    <div class="flex flex-wrap justify-center gap-md mb-md md:mb-0">
        <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary underline opacity-80 hover:opacity-100 transition-opacity" href="#">Contact Support</a>
