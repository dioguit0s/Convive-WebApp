<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Áreas Comuns - Convive</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script th:src="@{/js/tailwindTheme.js}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
</head>
<body class="bg-background text-on-surface font-body-md h-screen flex flex-col md:flex-row overflow-hidden">

<div th:replace="~{fragments/morador/components :: navMorador(activeItem='dashboard')}"></div>

<main class="flex-1 overflow-y-auto bg-background md:ml-64 p-margin">
    <div class="max-w-4xl mx-auto pb-xl">
        <div th:if="${sucesso}" class="p-sm rounded-lg bg-[#dcfce7] text-[#166534] font-body-sm mb-md" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="p-sm rounded-lg bg-[#fee2e2] text-[#991b1b] font-body-sm mb-md" th:text="${erro}"></div>

        <header class="mb-lg flex flex-col sm:flex-row sm:items-end sm:justify-between gap-md">
            <div>
                <a th:href="@{/moderador/dashboard}" class="text-primary font-label-md hover:underline flex items-center gap-xs mb-sm">
                    <span class="material-symbols-outlined text-sm">arrow_back</span> Voltar ao Dashboard
                </a>
                <h1 class="font-h1 text-h1 text-on-surface">Gestão de Áreas Comuns</h1>
                <p class="font-body-md text-on-surface-variant mt-xs">Cadastre, edite e controle a disponibilidade dos espaços do condomínio.</p>
            </div>
            <button type="button" onclick="abrirModalNova()"
                    class="w-full sm:w-auto bg-primary text-on-primary px-md py-[10px] rounded-lg font-label-md hover:bg-primary/90 transition-colors flex items-center justify-center gap-xs shadow-sm">
                <span class="material-symbols-outlined text-[18px]">add</span>
                Nova Área
            </button>
        </header>

        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead>
                <tr class="border-b border-outline-variant font-label-md text-label-md text-on-surface-variant bg-surface-container-low">
                    <th class="py-sm px-md font-normal">Área</th>
                    <th class="py-sm px-md font-normal">Capacidade</th>
                    <th class="py-sm px-md font-normal">Status</th>
                    <th class="py-sm px-md font-normal text-right">Ações</th>
                </tr>
                </thead>
                <tbody class="font-data-tabular text-data-tabular">
                <tr th:if="${#lists.isEmpty(areas)}">
                    <td colspan="4" class="py-lg text-center text-on-surface-variant">Nenhuma área cadastrada. Clique em "Nova Área" para começar.</td>
                </tr>
                <tr th:each="area : ${areas}" class="border-b border-surface-variant hover:bg-surface-container-low transition-colors">
                    <td class="py-sm px-md font-medium" th:text="${area.nome}">Nome</td>
                    <td class="py-sm px-md" th:text="${area.capacidade + ' pessoas'}">Capacidade</td>
                    <td class="py-sm px-md">
                        <span class="inline-block px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"
                              th:classappend="${area.statusArea.name() == 'ATIVA' ? 'bg-secondary-fixed text-on-secondary-container' : 'bg-error-container text-on-error-container'}"
                              th:text="${area.statusArea.name() == 'ATIVA' ? 'Ativa' : 'Em Manutenção'}">Status</span>
                    </td>
                    <td class="py-sm px-md text-right">
                        <button type="button"
                                class="inline-flex items-center gap-xs px-sm py-xs border border-outline-variant rounded-lg text-primary hover:bg-surface-container-high transition-colors text-xs font-semibold"
                                th:attr="data-id=${area.id},data-nome=${area.nome},data-capacidade=${area.capacidade},data-status=${area.statusArea.name()}"
                                onclick="abrirModalEditar(this)">
                            <span class="material-symbols-outlined text-[16px]">edit</span>
                            Editar
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Nova Área -->
<div id="modalNovaArea" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-md">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-lg w-full max-w-md">
        <div class="flex justify-between items-center mb-md">
            <h2 class="font-h2 text-h2 text-primary">Nova Área Comum</h2>
            <button type="button" onclick="fecharModalNova()" class="text-on-surface-variant hover:text-primary p-xs rounded-lg hover:bg-surface-container-low">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form th:action="@{/moderador/areasComuns/nova}" method="post" class="flex flex-col gap-sm">
            <div>
                <label class="block font-label-md text-on-surface-variant mb-1">Nome da área</label>
                <input type="text" name="nome" required maxlength="100"
                       class="w-full rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface text-on-surface px-sm py-sm"
                       placeholder="Ex.: Salão de Festas"/>
            </div>
            <div>
                <label class="block font-label-md text-on-surface-variant mb-1">Capacidade (pessoas)</label>
                <input type="number" name="capacidade" required min="1" max="9999" value="10"
                       class="w-full rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface text-on-surface px-sm py-sm"/>
            </div>
            <div>
                <label class="block font-label-md text-on-surface-variant mb-1">Status inicial</label>
                <select name="statusArea" required
                        class="w-full rounded-lg border border-outline-variant focus:border-primary bg-surface text-on-surface px-sm py-sm">
                    <option th:each="s : ${statusOptions}" th:value="${s.name()}"
                            th:selected="${s.name() == 'ATIVA'}"
                            th:text="${s.name() == 'ATIVA' ? 'Ativa' : 'Em Manutenção'}">Status</option>
                </select>
            </div>
            <div class="flex justify-end gap-sm mt-md">
                <button type="button" onclick="fecharModalNova()"
                        class="px-md py-[10px] rounded-lg font-label-md text-on-surface-variant hover:bg-surface-container transition-colors">Cancelar</button>
                <button type="submit"
                        class="bg-primary text-on-primary px-md py-[10px] rounded-lg font-label-md hover:bg-primary/90 transition-colors">Cadastrar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Editar Área -->
<div id="modalEditarArea" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-md">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-lg w-full max-w-md">
        <div class="flex justify-between items-center mb-md">
            <h2 class="font-h2 text-h2 text-primary">Editar Área Comum</h2>
            <button type="button" onclick="fecharModalEditar()" class="text-on-surface-variant hover:text-primary p-xs rounded-lg hover:bg-surface-container-low">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form id="formEditarArea" method="post" class="flex flex-col gap-sm">
            <div>
                <label class="block font-label-md text-on-surface-variant mb-1">Nome da área</label>
                <input type="text" id="edit-nome" name="nome" required maxlength="100"
                       class="w-full rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface text-on-surface px-sm py-sm"/>
            </div>
            <div>
                <label class="block font-label-md text-on-surface-variant mb-1">Capacidade (pessoas)</label>
                <input type="number" id="edit-capacidade" name="capacidade" required min="1" max="9999"
                       class="w-full rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface text-on-surface px-sm py-sm"/>
            </div>
            <div>
                <label class="block font-label-md text-on-surface-variant mb-1">Status</label>
                <select id="edit-status" name="statusArea" required
                        class="w-full rounded-lg border border-outline-variant focus:border-primary bg-surface text-on-surface px-sm py-sm">
                    <option th:each="s : ${statusOptions}" th:value="${s.name()}"
                            th:text="${s.name() == 'ATIVA' ? 'Ativa' : 'Em Manutenção'}">Status</option>
                </select>
            </div>
            <div class="flex justify-end gap-sm mt-md">
                <button type="button" onclick="fecharModalEditar()"
                        class="px-md py-[10px] rounded-lg font-label-md text-on-surface-variant hover:bg-surface-container transition-colors">Cancelar</button>
                <button type="submit"
                        class="bg-primary text-on-primary px-md py-[10px] rounded-lg font-label-md hover:bg-primary/90 transition-colors">Salvar alterações</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/areasComuns.js}"></script>
</body>
</html>
